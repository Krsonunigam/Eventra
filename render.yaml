services:
  - type: web
    name: eventraind
    env: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_URL
        value: https://eventrafrontend.vercel.app
